<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دكتور AI المصري</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f1117; color: #e8eaf0; font-family: 'Segoe UI', Tahoma, sans-serif; height: 100vh; display: flex; flex-direction: column; }
header { padding: 14px 20px; background: #1a1d27; border-bottom: 1px solid #2a2d3a; display: flex; align-items: center; gap: 10px; }
.logo { width: 34px; height: 34px; background: #00c89622; border: 1px solid #00c89640; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.title { font-size: 15px; font-weight: 600; }
.sub { font-size: 12px; color: #00c896; margin-top: 2px; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: #00c896; margin-right: auto; box-shadow: 0 0 8px #00c896; animation: pulse 2s infinite; }
#msgs { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 10px; max-width: 720px; width: 100%; margin: 0 auto; }
.welcome { text-align: center; color: #6b7280; font-size: 13px; padding: 32px 0; }
.welcome div { font-size: 28px; margin-bottom: 8px; }
.bubble { max-width: 78%; padding: 10px 14px; font-size: 14px; line-height: 1.7; white-space: pre-wrap; word-break: break-word; }
.user { background: #1e3a2f; border: 1px solid #00c89640; border-radius: 16px 16px 4px 16px; align-self: flex-start; }
.bot  { background: #1e2130; border: 1px solid #2a2d3a; border-radius: 16px 16px 16px 4px; align-self: flex-end; }
.typing { align-self: flex-end; background: #1e2130; border: 1px solid #2a2d3a; border-radius: 16px; padding: 12px 16px; display: flex; gap: 5px; align-items: center; }
.tdot { width: 7px; height: 7px; border-radius: 50%; background: #00c896; animation: bounce 1.2s ease-in-out infinite; }
.tdot:nth-child(2) { animation-delay: .2s; }
.tdot:nth-child(3) { animation-delay: .4s; }
footer { padding: 14px 16px; background: #1a1d27; border-top: 1px solid #2a2d3a; }
.input-row { max-width: 720px; margin: 0 auto; display: flex; gap: 8px; align-items: flex-end; }
#newBtn { display: none; background: transparent; border: 1px solid #2a2d3a; border-radius: 8px; color: #6b7280; font-size: 12px; padding: 0 12px; height: 40px; cursor: pointer; font-family: inherit; white-space: nowrap; }
#newBtn:hover { background: #2a2d3a; color: #e8eaf0; }
textarea { flex: 1; background: #20232f; border: 1px solid #2a2d3a; border-radius: 10px; padding: 10px 12px; color: #e8eaf0; font-size: 14px; font-family: inherit; resize: none; outline: none; line-height: 1.6; min-height: 42px; max-height: 120px; }
textarea:focus { border-color: #00c89660; }
#sendBtn { width: 40px; height: 40px; background: #00c896; border: none; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background .15s; }
#sendBtn:hover { background: #00e6ac; }
#sendBtn:disabled { background: #2a2d3a; cursor: not-allowed; }
.err { color: #ff6b6b; font-size: 12px; text-align: center; padding: 6px 0; max-width: 720px; margin: 0 auto; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
@keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.fadein { animation: fadeIn .2s ease; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: #2a2d3a; border-radius: 4px; }
</style>
</head>
<body>
<header>
  <div class="logo">⚕</div>
  <div>
    <div class="title">دكتور AI المصري</div>
    <div class="sub">مساعد طبي ذكي</div>
  </div>
  <div class="dot"></div>
</header>

<div id="msgs">
  <div class="welcome fadein">
    <div>🩺</div>
    <strong>أهلاً بك في دكتور AI</strong>
    <p style="margin-top:6px">احكيلي عن أعراضك — ابدأ بعمرك وجنسك</p>
  </div>
</div>

<div class="err" id="err"></div>

<footer>
  <div class="input-row">
    <button id="newBtn" onclick="clearChat()">محادثة جديدة</button>
    <textarea id="inp" rows="1" placeholder="اكتب أعراضك هنا..."></textarea>
    <button id="sendBtn" onclick="send()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0f1117" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</footer>

<script>
const API = "/chat";
const STORAGE_KEY = "egypt_medical_chat_history";
let history = [];
let loading = false;

function loadHistory() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) history = JSON.parse(saved);
  } catch (_) {
    history = [];
  }
}

function saveHistory() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
  } catch (_) {}
}

const msgsEl = document.getElementById("msgs");
const inp = document.getElementById("inp");
const sendBtn = document.getElementById("sendBtn");
const errEl = document.getElementById("err");
const newBtn = document.getElementById("newBtn");

inp.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});

function addBubble(text, role) {
  const w = msgsEl.querySelector(".welcome");
  if (w) w.remove();
  const d = document.createElement("div");
  d.className = "bubble fadein " + (role === "user" ? "user" : "bot");
  d.textContent = text;
  msgsEl.appendChild(d);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function showTyping() {
  const d = document.createElement("div");
  d.className = "typing fadein";
  d.id = "typing";
  d.innerHTML = '<div class="tdot"></div><div class="tdot"></div><div class="tdot"></div>';
  msgsEl.appendChild(d);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById("typing");
  if (t) t.remove();
}

async function send() {
  const msg = inp.value.trim();
  if (!msg || loading) return;
  loading = true;
  sendBtn.disabled = true;
  errEl.textContent = "";
  inp.value = "";
  addBubble(msg, "user");
  showTyping();
  newBtn.style.display = "block";
  try {
    const res = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg, history })
    });
    if (!res.ok) {
      throw new Error(res.status === 502 || res.status === 503
        ? "السيرفر مشغول — استنى شوية وحاول تاني"
        : "HTTP " + res.status);
    }
    const data = await res.json();
    removeTyping();
    addBubble(data.response, "bot");
    history.push({ role: "user", content: msg });
    history.push({ role: "assistant", content: data.response });
    saveHistory();
  } catch(e) {
    removeTyping();
    errEl.textContent = "خطأ في الاتصال: " + e.message;
  } finally {
    loading = false;
    sendBtn.disabled = false;
    inp.focus();
  }
}

function restoreMessages() {
  if (!history.length) return;
  const w = msgsEl.querySelector(".welcome");
  if (w) w.remove();
  for (const msg of history) {
    addBubble(msg.content, msg.role === "user" ? "user" : "bot");
  }
  newBtn.style.display = "block";
}

function clearChat() {
  history = [];
  localStorage.removeItem(STORAGE_KEY);
  msgsEl.innerHTML = '<div class="welcome fadein"><div>🩺</div><strong>أهلاً بك في دكتور AI</strong><p style="margin-top:6px">احكيلي عن أعراضك — ابدأ بعمرك وجنسك</p></div>';
  errEl.textContent = "";
  newBtn.style.display = "none";
}

loadHistory();
restoreMessages();
</script>
</body>
</html>
